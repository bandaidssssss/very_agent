data:
  train_batch_size: 96                # 为容纳 14B 模型，从 128 适当降低；保持 rollout.n=8 以保证优势估计质量
  max_prompt_length: 1280
  max_response_length: 5120

trainer:
  total_epochs: 1

actor_rollout_ref:
  model:
    use_remove_padding: True
    use_dynamic_bsz: False

  actor:
    optim:
      lr: 3e-6
      lr_warmup_steps: 0
    use_kl_loss: True
    kl_loss_coef: 3e-3
    kl_loss_type: low_var_kl
    entropy_coeff: 0

    # 满足整除：96 * 8 = 768，768 % 96 == 0，96 % 3 == 0
    ppo_mini_batch_size: 96
    ppo_micro_batch_size_per_gpu: 3   # 训练微批从 2 提升到 3，提高训练 MFU

    megatron:
      tensor_model_parallel_size: 4   # 14B 模型仍用 4 卡张量并行，每卡参数约 7GB
      pipeline_model_parallel_size: 1
      sequence_parallel: True
      use_distributed_optimizer: True
      optimizer_offload: True         # 优化器状态 offload 到 CPU，大幅降低训练显存
      param_offload: False

      override_transformer_config:
        attention_backend: flash
        bf16: True
        # 开启选择性重计算，使训练 micro batch 可设为 3
        recompute_granularity: selective
        recompute_modules: ['core_attn']
        recompute_method: None
        recompute_num_layers: None

  rollout:
    n: 8                              # 保持 8 个 response，保证优势估计稳定性
    tensor_model_parallel_size: 4     # vLLM 使用 4 卡 TP，降低每卡模型显存
    log_prob_micro_batch_size_per_gpu: 6  # 14B 模型 log_prob 峰值是瓶颈，从 12 降至 6
    gpu_memory_utilization: 0.7
    max_num_batched_tokens: 65536
    max_num_seqs: 256
    free_cache_engine: True
    enable_chunked_prefill: True
    enable_prefix_caching: True
    enforce_eager: False

  ref:
    log_prob_micro_batch_size_per_gpu: 24  # ref 开启 param_offload，可以保持较大微批
    megatron:
      tensor_model_parallel_size: 4
      pipeline_model_parallel_size: 1
      sequence_parallel: True
      param_offload: True                # ref 模型 offload 到 CPU，降低 ref 阶段显存
